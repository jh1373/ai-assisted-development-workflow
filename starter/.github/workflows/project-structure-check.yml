name: Project Structure Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  project-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project structure map
        run: python3 scripts/project-structure.py validate --ci

      - name: Check generated directory map
        run: python3 scripts/project-structure.py generate --check
