name: Docs Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check documentation structure
        run: bash scripts/check-docs.sh

      - name: Test Bash initialization checker
        run: bash scripts/test-initialization-checker.sh

      - name: Test PowerShell initialization checker
        shell: pwsh
        run: ./scripts/test-initialization-checker.ps1

      - name: Test project structure map
        run: python3 scripts/test-project-structure.py
